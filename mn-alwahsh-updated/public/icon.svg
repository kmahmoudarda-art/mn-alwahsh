<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a0000"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="170" fill="none" stroke="#CC0000" stroke-width="6" opacity="0.5"/>
  <circle cx="256" cy="220" r="140" fill="none" stroke="#8B0000" stroke-width="2" opacity="0.4"/>
  <!-- Arabic م  -->
  <text x="256" y="310" text-anchor="middle" font-size="230" fill="#CC0000"
        font-family="Georgia, 'Times New Roman', serif" font-weight="bold" filter="url(#glow)">م</text>
  <!-- Subtitle -->
  <text x="256" y="420" text-anchor="middle" font-size="48" fill="#FF6666"
        font-family="Arial, sans-serif" opacity="0.85">من الوحش</text>
  <!-- Corner skulls -->
  <text x="60" y="110" font-size="52" opacity="0.35">💀</text>
  <text x="390" y="110" font-size="52" opacity="0.35">💀</text>
</svg>
