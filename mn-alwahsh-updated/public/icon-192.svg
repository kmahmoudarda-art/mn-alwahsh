<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0d0000"/>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a0000"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Arabic text "من الوحش" stylized -->
  <text x="96" y="80" text-anchor="middle" font-family="serif" font-size="28" font-weight="900" fill="#CC0000" filter="url(#glow)">من</text>
  <text x="96" y="118" text-anchor="middle" font-family="serif" font-size="28" font-weight="900" fill="#CC0000" filter="url(#glow)">الوحش</text>
  <!-- Skull emoji area -->
  <text x="96" y="158" text-anchor="middle" font-size="24">💀</text>
  <!-- Red glow ring -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#8B0000" stroke-width="3" opacity="0.6"/>
</svg>
